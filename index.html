<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소파 바닥매트 — GANYANG</title>
    <link rel="stylesheet" href="css/simulator.css">
</head>
<body>

    <!-- 타이틀 -->
    <section class="pt">
        <div class="pt__inner">
            <p class="pt__cat">SOFA FLOOR MAT</p>
            <h1 class="pt__title">나만의 조합을 찾아보세요</h1>
        </div>
    </section>

    <!-- 시뮬레이터 -->
    <main class="sim">
        <div class="sim__layout">

            <!-- ── 미리보기 (좌) ── -->
            <div class="sim__preview">
                <div class="sim__scene">
                    <div class="sim__mat-wrap">
                        <img id="matImg" class="sim__mat-img" src="" alt="바닥매트" style="display:none">
                        <div id="matShape" class="sim__mat-shape"></div>
                    </div>
                    <div class="sim__sofa-wrap">
                        <img id="sofaImg" class="sim__sofa-img" src="" alt="소파">
                    </div>
                </div>
                <div class="sim__badge">
                    <span class="sim__badge-dot"></span>
                    <span id="badgeText">색상을 선택해주세요</span>
                </div>
            </div>

            <!-- ── 옵션 패널 (우) ── -->
            <div class="sim__panel">

                <!-- STEP 01 소파 색상 (시각적 참고용) -->
                <div class="sim__step">
                    <div class="sim__step-head">
                        <span class="sim__step-num">01</span>
                        <div>
                            <h2 class="sim__step-title">소파 색상</h2>
                            <p class="sim__step-desc">내 소파와 가장 가까운 색상을 선택하세요</p>
                        </div>
                    </div>
                    <div class="sim__swatches" id="sofaSwatches" role="radiogroup" aria-label="소파 색상"></div>
                </div>

                <div class="sim__rule"></div>

                <!-- STEP 02 매트 색상 (구매 옵션) -->
                <div class="sim__step">
                    <div class="sim__step-head">
                        <span class="sim__step-num">02</span>
                        <div>
                            <h2 class="sim__step-title">매트 색상</h2>
                            <p class="sim__step-desc">원하는 매트 색상을 선택하세요</p>
                        </div>
                    </div>
                    <div class="sim__swatches" id="matSwatches" role="radiogroup" aria-label="매트 색상"></div>
                </div>

                <!-- ── 선택된 상품 박스 ── -->
                <div class="opt-box" id="optBox">

                    <!-- 아무것도 선택 안 됐을 때 -->
                    <div class="opt-empty" id="optEmpty">
                        매트 색상을 선택해주세요
                    </div>

                    <!-- 선택된 항목 (JS로 동적 생성) -->
                    <div class="opt-items" id="optItems"></div>

                </div>

                <!-- ── 총 상품금액 ── -->
                <div class="opt-total" id="optTotal" style="display:none">
                    <span class="opt-total__label">총 상품금액</span>
                    <strong class="opt-total__price" id="totalPrice">0원</strong>
                </div>

                <!-- ── 구매 버튼 영역 ── -->
                <div class="buy-area">
                    <button class="buy-btn buy-btn--cart" id="cartBtn" onclick="addToCart()" disabled>
                        장바구니 담기
                    </button>
                    <button class="buy-btn buy-btn--now" id="buyBtn" onclick="buyNow()" disabled>
                        바로 구매
                    </button>
                </div>

            </div>
            <!-- /sim__panel -->

        </div>
    </main>

    <!-- ── 하단 고정 바 (모바일) ── -->
    <footer class="gf">
        <div class="gf__inner">
            <div class="gf__info">
                <span class="gf__label" id="gfLabel">색상을 선택해주세요</span>
                <span class="gf__price" id="gfPrice" style="display:none"></span>
            </div>
            <div class="gf__btns">
                <button class="gf__btn gf__btn--cart" id="gfCartBtn" onclick="addToCart()" disabled>장바구니</button>
                <button class="gf__btn gf__btn--now" id="gfBuyBtn" onclick="buyNow()" disabled>바로 구매</button>
            </div>
        </div>
    </footer>

    <!-- 토스트 -->
    <div class="toast" id="toast" role="alert">
        <span class="toast__icon">✓</span>
        <span id="toastMsg">장바구니에 담겼습니다.</span>
    </div>

    <script src="js/simulator.js"></script>
</body>
</html>
