<script>

/* ══════════════════════════════════════════
   제품 데이터  (실제 제품 사진 기반)
══════════════════════════════════════════ */
var PRODUCTS = {
    /* 투사이드 바닥 매트리스 : 차콜 그레이, 메쉬 패브릭, 프레임 없음 */

    },
    /* 시그니처 더나인s : 진한 슬레이트 + 윗면 흰색 라인 + THE9 라벨 (두꺼움) */

        tag: 'THE 9',
        accentLine: true, the9Label: true, cornerTag: false,
        hasBand: false, bandHex: 0,

    },
    /* ZIP 접이식 : 네이비 슬레이트 + 접이선 2개 + 흰색 라인 */
    zip: {
        h: 0.08,
        type: 'floor',
        topHex:  0x3D4350,    /* 네이비 슬레이트 */
        sideHex: 0x262A33,
        accentLine: true, the9Label: false, cornerTag: false,
        hasBand: false, bandHex: 0,
        hasFold: true,
        topImage:  'images/zip_top.png',
        sideImage: 'images/zip_side.png'
    },
    /* 베이직 : 차콜 그레이 + 가운데 3색 SENSE MOM 띠 */
    basic: {
        h: 0.07,
        type: 'floor',
        topHex:  0x474C55,    /* 차콜 그레이 */
        sideHex: 0x2A2D34,
        senseBand: true,
        accentLine: false, the9Label: false, cornerTag: false,
        hasBand: false, bandHex: 0,
        hasFold: false,
        topImage:  'images/basic_top.png',
        sideImage: 'images/basic_side.png'
    }
};

var SIZES = { ss:{w:1.10,l:2.00}, q:{w:1.52,l:2.00}, k:{w:1.80,l:2.00} };
var FLOOR_HEX = { wood:0xBF9B72, tile:0xDAD6D0, gray:0xB4B0AB, white:0xEEEBE5 };
var WALL_HEX  = { white:0xF3F0EC, beige:0xE5DBCA, gray:0xD2CFCA, mocha:0xC0B0A1 };

var urlP  = new URLSearchParams(window.location.search);
var state = { prod:urlP.get('prod')||'twoside', size:urlP.get('size')||'ss',
              bedding:0xF5F2EE, floor:'wood', wall:'white',
              styling:'full',   /* 'full' = 침구 포함, 'bare' = 매트리스만 */
              isAR:false, placed:false, rotDeg:0 };

/* ══════════════════════════════════════════
   텍스처 생성 함수들
══════════════════════════════════════════ */
function clamp(v){ return Math.min(255,Math.max(0,Math.round(v))); }
function hexRGB(h){ return { r:(h>>16)&0xff, g:(h>>8)&0xff, b:h&0xff }; }

/* ── 투사이드 실제 제품 메쉬 패브릭 텍스처 ──
   실제 제품 사진 분석:
   - 블루-차콜 그레이 (#5C6472)
   - 촘촘한 수평 리브(rib) 패턴
   - 가로×세로 격자 메쉬
   - 모서리 음영
   - SENSEMOM 우측하단 대각 태그 */
function makeMeshFabricTex(hex, opts) {
    opts = opts || {};
    var tagText    = opts.tag || 'SENSE MOM';   /* 코너 태그 텍스트 */
    var accentLine = opts.accentLine || false;  /* 윗면 흰색 가로 라인 */
    var the9Label  = opts.the9Label || false;   /* 흰색 THE9 라벨 (시그니처) */
    var cornerTag  = opts.cornerTag || false;   /* 어두운 대각 코너 태그 (투사이드) */
    var senseBand  = opts.senseBand || false;   /* 3색 SENSE MOM 띠 (베이직) */
    var S = 512;
    var cv = document.createElement('canvas');
    cv.width = cv.height = S;
    var ctx = cv.getContext('2d');
    var c = hexRGB(hex);

    /* 베이스 색상 */
    ctx.fillStyle = 'rgb('+c.r+','+c.g+','+c.b+')';
    ctx.fillRect(0, 0, S, S);

    /* ① 수평 리브 라인 (주 질감) */
    for (var y = 0; y < S; y += 4) {
        /* 어두운 선 */
        ctx.fillStyle = 'rgba(0,0,0,0.11)';
        ctx.fillRect(0, y, S, 1);
        /* 밝은 선 (하이라이트) */
        ctx.fillStyle = 'rgba(255,255,255,0.045)';
        ctx.fillRect(0, y+2, S, 1);
    }

    /* ② 수직 미세 격자 (메쉬 느낌) */
    for (var x = 0; x < S; x += 4) {
        ctx.fillStyle = 'rgba(0,0,0,0.05)';
        ctx.fillRect(x, 0, 1, S);
    }

    /* ③ 전체 빛 방향 그래디언트 (왼쪽 상단 → 오른쪽 하단) */
    var lightGrad = ctx.createLinearGradient(0, 0, S*0.8, S*0.8);
    lightGrad.addColorStop(0,   'rgba(255,255,255,0.07)');
    lightGrad.addColorStop(0.35,'rgba(255,255,255,0.02)');
    lightGrad.addColorStop(0.7, 'rgba(0,0,0,0)');
    lightGrad.addColorStop(1,   'rgba(0,0,0,0.09)');
    ctx.fillStyle = lightGrad;
    ctx.fillRect(0, 0, S, S);

    /* ④ 4면 모서리 음영 (실제 제품 사진의 edge shadow) */
    var ew = 40;
    var edges = [
        [0,0,ew,S,  ew,0,0,0],          /* 왼쪽 */
        [S-ew,0,ew,S, S-ew,0,S,0],       /* 오른쪽 */
        [0,0,S,ew,  0,0,0,ew],            /* 위 */
        [0,S-ew,S,ew, 0,S-ew,0,S]        /* 아래 */
    ];
    edges.forEach(function(e){
        var g = ctx.createLinearGradient(e[4],e[5],e[6],e[7]);
        g.addColorStop(0,'rgba(0,0,0,0.18)'); g.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=g; ctx.fillRect(e[0],e[1],e[2],e[3]);
    });

    /* ── 3색 SENSE MOM 띠 (베이직) ── */
    if (senseBand) {
        var bTop = S * 0.44;
        var h1 = S*0.035, h2 = S*0.052, h3 = S*0.030;
        /* 블루그레이 스트라이프 */
        ctx.fillStyle = '#6E7E9E';
        ctx.fillRect(0, bTop, S, h1);
        /* 흰색 스트라이프 + SENSE MOM 반복 텍스트 */
        var wy = bTop + h1;
        ctx.fillStyle = '#F2F2F0';
        ctx.fillRect(0, wy, S, h2);
        ctx.fillStyle = '#3A3F48';
        ctx.font = 'bold 11px Arial, sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        for (var tx = 6; tx < S; tx += 132) {
            ctx.fillText('SENSE MOM', tx, wy + h2/2 + 1);
        }
        ctx.textBaseline = 'alphabetic';
        /* 청록(시안) 스트라이프 */
        ctx.fillStyle = '#36C4E6';
        ctx.fillRect(0, wy + h2, S, h3);
    }

    /* ── 흰색 가로 라인 (시그니처 / 접이식) ── */
    if (accentLine) {
        var ly = S * 0.82;
        ctx.fillStyle = 'rgba(238,239,242,0.95)';
        ctx.fillRect(0, ly, S, 3);
        ctx.fillStyle = 'rgba(0,0,0,0.10)';
        ctx.fillRect(0, ly+3, S, 1);
        ctx.fillRect(0, ly-1, S, 1);
    }

    /* ── 흰색 THE9 라벨 (시그니처 전용) ── */
    if (the9Label) {
        var lw = 46, lh = 30;
        var lx = S * 0.88, lyy = S * 0.90;
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(lx, lyy, lw, lh);
        ctx.strokeStyle = 'rgba(0,0,0,0.12)';
        ctx.lineWidth = 1;
        ctx.strokeRect(lx + 0.5, lyy + 0.5, lw - 1, lh - 1);
        ctx.fillStyle = '#2B2F38';
        ctx.textAlign = 'center';
        ctx.font = '4px Arial, sans-serif';
        ctx.fillText('SIGNATURE', lx + lw/2, lyy + 10);
        ctx.font = 'bold 14px Arial, sans-serif';
        ctx.fillText('THE 9', lx + lw/2, lyy + 23);
        ctx.font = '4px Arial, sans-serif';
        ctx.fillStyle = 'rgba(43,47,56,0.55)';
        ctx.fillText('시그니처 더나인', lx + lw/2, lyy + 30);
    }

    /* ── 어두운 대각 코너 태그 (투사이드 SENSE MOM) ── */
    if (cornerTag) {
        ctx.save();
        ctx.translate(S - 50, S - 20);
        ctx.rotate(-Math.PI / 4);
        ctx.fillStyle = '#111318';
        ctx.beginPath();
        ctx.rect(-4, -7, 68, 14);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.78)';
        ctx.font = 'bold 7px -apple-system, Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(tagText, 30, 2);
        ctx.restore();
    }

    var t = new THREE.CanvasTexture(cv);
    t.encoding = THREE.sRGBEncoding;
    return t;
}

/* 사이드 다크 패브릭 (투사이드 제품 사진의 거의 블랙 사이드) */
function makeDarkSideTex(hex) {
    var W = 64, H = 16;
    var cv = document.createElement('canvas');
    cv.width = W; cv.height = H;
    var ctx = cv.getContext('2d');
    var c = hexRGB(hex);
    /* 매우 미세한 수평 줄 */
    for (var i = 0; i < H; i++) {
        var v = (i % 2 === 0) ? 6 : 0;
        ctx.fillStyle = 'rgb('+clamp(c.r+v)+','+clamp(c.g+v)+','+clamp(c.b+v)+')';
        ctx.fillRect(0, i, W, 1);
    }
    /* 상하 하이라이트/그림자 라인 */
    ctx.fillStyle = 'rgba(255,255,255,0.08)'; ctx.fillRect(0, 0, W, 1);
    ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.fillRect(0, H-1, W, 1);

    var t = new THREE.CanvasTexture(cv);
    t.encoding = THREE.sRGBEncoding;
    t.wrapS = t.wrapT = THREE.RepeatWrapping;
    t.repeat.set(20, 4);
    return t;
}

/* 일반 퀼팅 텍스처 (다른 제품용) */
function makeQuiltTex(hex) {
    var S=512, cell=52;
    var cv=document.createElement('canvas'); cv.width=cv.height=S;
    var ctx=cv.getContext('2d'); var c=hexRGB(hex);
    ctx.fillStyle='rgb('+c.r+','+c.g+','+c.b+')'; ctx.fillRect(0,0,S,S);
    ctx.strokeStyle='rgba(0,0,0,0.075)'; ctx.lineWidth=1.1;
    for(var row=-1;row<=S/cell+1;row++){
        for(var col=-1;col<=S/cell+1;col++){
            var cx=col*cell,cy=row*cell;
            ctx.beginPath(); ctx.moveTo(cx+cell/2,cy); ctx.lineTo(cx+cell,cy+cell/2);
            ctx.lineTo(cx+cell/2,cy+cell); ctx.lineTo(cx,cy+cell/2); ctx.closePath(); ctx.stroke();
            var bx=cx+cell/2,by=cy+cell/2;
            var gr=ctx.createRadialGradient(bx,by,0,bx,by,6);
            gr.addColorStop(0,'rgba(0,0,0,0.28)'); gr.addColorStop(1,'rgba(0,0,0,0)');
            ctx.beginPath(); ctx.arc(bx,by,6,0,Math.PI*2); ctx.fillStyle=gr; ctx.fill();
            ctx.beginPath(); ctx.arc(bx-1,by-1,2,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.38)'; ctx.fill();
        }
    }
    var t=new THREE.CanvasTexture(cv); t.encoding=THREE.sRGBEncoding; return t;
}

/* 이불 텍스처 */
function makeBeddingTex(hex) {
    var S=256,cell=38;
    var cv=document.createElement('canvas'); cv.width=cv.height=S;
    var ctx=cv.getContext('2d'); var c=hexRGB(hex);
    ctx.fillStyle='rgb('+c.r+','+c.g+','+c.b+')'; ctx.fillRect(0,0,S,S);
    ctx.strokeStyle='rgba(0,0,0,0.06)'; ctx.lineWidth=1;
    for(var r=0;r<=S/cell+1;r++) for(var cl=0;cl<=S/cell+1;cl++) ctx.strokeRect(cl*cell+3,r*cell+3,cell-6,cell-6);
    var t=new THREE.CanvasTexture(cv); t.encoding=THREE.sRGBEncoding; return t;
}

/* 노멀맵 (컬러 텍스처 → 높이 차이로 유도) */
function makeNormalFrom(colorCanvas, strength) {
    strength = strength || 2.5;
    var S=colorCanvas.width;
    var src=colorCanvas.getContext('2d').getImageData(0,0,S,S).data;
    var cv=document.createElement('canvas'); cv.width=cv.height=S;
    var ctx=cv.getContext('2d'); var nd=ctx.createImageData(S,S);
    function lum(x,y){ x=Math.max(0,Math.min(S-1,x)); y=Math.max(0,Math.min(S-1,y)); var i=(y*S+x)*4; return (src[i]*0.299+src[i+1]*0.587+src[i+2]*0.114)/255; }
    for(var y=0;y<S;y++){
        for(var x=0;x<S;x++){
            var i=(y*S+x)*4;
            var nx=(lum(x-1,y)-lum(x+1,y))*strength, ny=(lum(x,y-1)-lum(x,y+1))*strength, nz=1;
            var len=Math.sqrt(nx*nx+ny*ny+nz*nz);
            nd.data[i]=clamp((nx/len*0.5+0.5)*255); nd.data[i+1]=clamp((ny/len*0.5+0.5)*255);
            nd.data[i+2]=clamp((nz/len*0.5+0.5)*255); nd.data[i+3]=255;
        }
    }
    ctx.putImageData(nd,0,0); return new THREE.CanvasTexture(cv);
}

/* 원목 바닥 텍스처 */
function makeWoodTex(hex) {
    var W=512,H=512; var cv=document.createElement('canvas'); cv.width=W; cv.height=H;
    var ctx=cv.getContext('2d'); var c=hexRGB(hex);
    ctx.fillStyle='rgb('+c.r+','+c.g+','+c.b+')'; ctx.fillRect(0,0,W,H);
    for(var i=0;i<60;i++){
        var y=i*9+Math.random()*4-2, al=0.025+Math.random()*0.04;
        ctx.strokeStyle='rgba(0,0,0,'+al+')'; ctx.lineWidth=0.6+Math.random()*0.8;
        ctx.beginPath(); ctx.moveTo(0,y);

var texLoader = new THREE.TextureLoader();
function loadImageInto(material, url) {
    if (!url) return;
    texLoader.load(
        url,
        function(tex) {                       /* 성공: 실제 사진 적용 */
            tex.encoding = THREE.sRGBEncoding;
            tex.anisotropy = renderer.capabilities.getMaxAnisotropy();

        undefined,
        function() { /* 실패: 캔버스 텍스처 유지 */ }

}

function createBed(prodKey, sizeKey, beddingHex) {
    var p=PRODUCTS[prodKey], sz=SIZES[sizeKey];
    var g=new THREE.Group();
    var mattH=p.h;

    if (p.type === 'floor') {
        /* ━━ 바닥 매트리스 (투사이드 실제 제품) ━━
           사진 분석:
           - 프레임/헤드보드 없음
           - 납작하게 바닥에 배치
           - 차콜 그레이 탑 + 다크 사이드
           - 모서리는 살짝 챔퍼(chamfer) 처리된 느낌 */

        var topTex  = makeMeshFabricTex(p.topHex, { tag:p.tag, accentLine:p.accentLine, the9Label:p.the9Label, cornerTag:p.cornerTag, senseBand:p.senseBand });
        var topNorm = makeNormalFrom(topTex.image, 1.5);
        topNorm.encoding = THREE.LinearEncoding;
        var sideTex = makeDarkSideTex(p.sideHex);

        var topMat = new THREE.MeshStandardMaterial({
            map:topTex, normalMap:topNorm, normalScale:new THREE.Vector2(0.3,0.3),
            roughness:0.85, metalness:0, envMapIntensity:0.45
        });
        var sideMat = new THREE.MeshStandardMaterial({
            map:sideTex, roughness:0.88, metalness:0, envMapIntensity:0.3
        });
        var botMat = new THREE.MeshStandardMaterial({ color:p.sideHex, roughness:0.92 });

        /* 실제 제품 사진이 있으면 윗면/옆면에 적용 (없으면 위 캔버스 텍스처 유지) */
        loadImageInto(topMat,  p.topImage);
        loadImageInto(sideMat, p.sideImage);

        /* 메인 매트리스 바디 */
        var mattGeo = new THREE.BoxGeometry(sz.w, mattH, sz.l);
        var mattMesh = new THREE.Mesh(mattGeo, [sideMat,sideMat,topMat,botMat,sideMat,sideMat]);
        mattMesh.position.y = mattH/2;
        mattMesh.castShadow = mattMesh.receiveShadow = true;
        g.add(mattMesh);

        /* 투사이드: 양면 구분 밴드 라인 (사진에는 없지만 제품 특성상) */
        if (p.hasBand) {
            var bandMat = new THREE.MeshStandardMaterial({ color:p.bandHex, roughness:0.85 });
            var band = new THREE.Mesh(new THREE.BoxGeometry(sz.w+0.001,0.010,sz.l+0.001), bandMat);
            band.position.y = mattH/2;
            g.add(band);
        }

        /* ZIP 접이선 */
        if (p.hasFold) {
            var foldMat=new THREE.MeshStandardMaterial({color:0xBCB8B0,roughness:0.9});
            [-sz.l/3,sz.l/3].forEach(function(z){
                var fl=new THREE.Mesh(new THREE.BoxGeometry(sz.w+0.001,mattH+0.002,0.012),foldMat);
                fl.position.set(0,mattH/2,z); g.add(fl);
            });
        }

        /* ── 침구 (스타일링 'full'일 때만) ── */
        if (state.styling === 'full') {
            /* 이불 (선택 색상) */
            var bddH=0.06, bddLen=sz.l*0.65;
            var bddMat=new THREE.MeshStandardMaterial({map:makeBeddingTex(beddingHex),roughness:0.94,metalness:0,envMapIntensity:0.25});
            var bddMesh=new THREE.Mesh(new THREE.BoxGeometry(sz.w-0.02,bddH,bddLen),bddMat);
            bddMesh.position.set(0,mattH+bddH/2,sz.l*0.06); bddMesh.castShadow=true; g.add(bddMesh);

            /* 이불 접힘 */
            var foldBr=Math.min(0xFFFFFF,beddingHex+0x0E0E0E);
            var foldMesh=new THREE.Mesh(new THREE.BoxGeometry(sz.w-0.02,0.02,0.22),new THREE.MeshStandardMaterial({map:makeBeddingTex(foldBr),roughness:0.92}));
            foldMesh.position.set(0,mattH+bddH+0.01,sz.l*0.06-bddLen/2-0.01); g.add(foldMesh);

            /* 베개 */
            var pilY=mattH+0.038, pilZ=-sz.l/2+0.35;
            [-sz.w*0.22,sz.w*0.22].forEach(function(px,i){
                var pt=makeQuiltTex(i===0?0xF8F5F0:0xF0EDE8);
                var pm=new THREE.MeshStandardMaterial({map:pt,roughness:0.9,envMapIntensity:0.3});
                var pil=new THREE.Mesh(new THREE.BoxGeometry(sz.w*0.38,0.08,0.54),pm);
                pil.position.set(px,pilY,pilZ); pil.castShadow=true; g.add(pil);
            });
        }

    } else {
        /* ━━ 침대 프레임 타입 (시그니처 등) ━━ */
        var platH=0.08;
        var platMat=new THREE.MeshStandardMaterial({color:0x4A3828,roughness:0.68,metalness:0.05,envMapIntensity:0.5});
        var plat=new THREE.Mesh(new THREE.BoxGeometry(sz.w+0.06,platH,sz.l+0.06),platMat);
        plat.position.y=platH/2; plat.castShadow=plat.receiveShadow=true; g.add(plat);

        var hbMat=new THREE.MeshStandardMaterial({color:0x5E4430,roughness:0.65,metalness:0.03,envMapIntensity:0.4});
        var panMat=new THREE.MeshStandardMaterial({color:0x6E5440,roughness:0.62,metalness:0.03,envMapIntensity:0.5});
        var hbH=0.76;
        var hb=new THREE.Mesh(new THREE.BoxGeometry(sz.w+0.06,hbH,0.10),hbMat);
        hb.position.set(0,platH+hbH/2,-sz.l/2-0.05); hb.castShadow=true; g.add(hb);
        var pan=new THREE.Mesh(new THREE.BoxGeometry(sz.w-0.08,hbH-0.14,0.05),panMat);
        pan.position.set(0,platH+hbH/2,-sz.l/2-0.09); g.add(pan);
        var lm=new THREE.MeshStandardMaterial({color:0x8A6E54,roughness:0.5,metalness:0.1});
        [0.16,0.34,0.52].forEach(function(y){
            var l=new THREE.Mesh(new THREE.BoxGeometry(sz.w-0.08,0.007,0.007),lm);
            l.position.set(0,platH+y,-sz.l/2-0.063); g.add(l);
        });

        var topTex=makeQuiltTex(p.topHex); var topNorm=makeNormalFrom(topTex.image,2.5); topNorm.encoding=THREE.LinearEncoding;
        var topMat2=new THREE.MeshStandardMaterial({map:topTex,normalMap:topNorm,normalScale:new THREE.Vector2(0.4,0.4),roughness:0.88,metalness:0,envMapIntensity:0.5});
        var sideTex2=makeDarkSideTex(p.sideHex);
        var sideMat2=new THREE.MeshStandardMaterial({map:sideTex2,roughness:0.9,envMapIntensity:0.35});
        var botMat2=new THREE.MeshStandardMaterial({color:p.sideHex,roughness:0.95});
        var matt=new THREE.Mesh(new THREE.BoxGeometry(sz.w,mattH,sz.l),[sideMat2,sideMat2,topMat2,botMat2,sideMat2,sideMat2]);
        matt.position.y=platH+mattH/2; matt.castShadow=true; g.add(matt);

        var surfY=platH+mattH;
        var topper=new THREE.Mesh(new THREE.BoxGeometry(sz.w-0.02,0.05,sz.l-0.02),new THREE.MeshStandardMaterial({map:makeQuiltTex(0xFAF7F3),roughness:0.92,envMapIntensity:0.4}));
        topper.position.y=surfY+0.025; topper.castShadow=true; g.add(topper); surfY+=0.05;

        if (state.styling === 'full') {
            var bddH=0.09,bddLen=sz.l*0.62;
            var bddM=new THREE.MeshStandardMaterial({map:makeBeddingTex(beddingHex),roughness:0.94,metalness:0,envMapIntensity:0.3});
            var bdg=new THREE.Mesh(new THREE.BoxGeometry(sz.w-0.04,bddH,bddLen),bddM); bdg.position.set(0,surfY+bddH/2,sz.l*0.07); bdg.castShadow=true; g.add(bdg);
            var fm=new THREE.Mesh(new THREE.BoxGeometry(sz.w-0.04,0.024,0.26),new THREE.MeshStandardMaterial({map:makeBeddingTex(Math.min(0xFFFFFF,beddingHex+0x101010)),roughness:0.92}));
            fm.position.set(0,surfY+bddH+0.012,sz.l*0.07-bddLen/2-0.01); g.add(fm);
            [-sz.w*0.22,sz.w*0.22].forEach(function(px,i){
                var pt=makeQuiltTex(i===0?0xF8F5F0:0xF0EDE8);
                var pil=new THREE.Mesh(new THREE.BoxGeometry(sz.w*0.38,0.088,0.56),new THREE.MeshStandardMaterial({map:pt,roughness:0.9,envMapIntensity:0.35}));
                pil.position.set(px,surfY+0.044,-sz.l/2+0.38); pil.castShadow=true; g.add(pil);
            });
        }
    }

    return g;
}

/* 그룹의 모든 geometry/material/texture 해제 (메모리 누수 방지) */
function disposeGroup(grp){
    grp.traverse(function(o){
        if(o.geometry) o.geometry.dispose();
        if(o.material){
            var mats = Array.isArray(o.material) ? o.material : [o.material];
            mats.forEach(function(m){
                if(m.map)       m.map.dispose();
                if(m.normalMap) m.normalMap.dispose();
                m.dispose();
            });
        }
    });
}

function updateBed(){
    var ry=0, px=0, pz=0;
    /* 씬에 남아있는 '모든' 매트리스 그룹을 강제로 제거 (겹침 방지) */
    for(var i=scene.children.length-1; i>=0; i--){
        var c=scene.children[i];
        if(c.userData && c.userData.isBed){
            ry=c.rotation.y; px=c.position.x; pz=c.position.z;
            scene.remove(c);
            disposeGroup(c);
        }
    }
    bedGroup = createBed(state.prod, state.size, state.bedding);
    bedGroup.userData.isBed = true;
    bedGroup.rotation.y = ry;
    if(state.placed){ bedGroup.position.x=px; bedGroup.position.z=pz; }
    scene.add(bedGroup);
}

var hitTestSource=null,localSpace=null,hasHitTest=false;

function placeBed(){
    if(!bedGroup) return;
    if(hasHitTest&&reticle.visible){bedGroup.position.copy(reticle.position);floorPlane.constant=-reticle.position.y;}
    else{var pos=lastCamPos.clone(),dir=lastCamDir.clone();dir.y=0;if(dir.lengthSq()<0.001)dir.set(0,0,-1);dir.normalize();pos.addScaledVector(dir,2.0);pos.y=0;bedGroup.position.copy(pos);}
    state.rotDeg=0;bedGroup.rotation.y=0;bedGroup.visible=true;state.placed=true;reticle.visible=false;
    document.getElementById('arGuide').textContent='화면을 드래그하여 이동하거나 하단의 회전바로 각도를 조절하세요';

    document.getElementById('arPlaceBtn').style.display='none';
    document.getElementById('rotateBar').style.display='flex';

function startAR(){
    var btn=document.getElementById('arStartBtn'),hint=document.getElementById('arHint');
    if(!navigator.xr){hint.textContent='⚠ AR 미지원 브라우저';hint.style.color='#ff9090';return;}
    navigator.xr.isSessionSupported('immersive-ar').then(function(ok){
        if(!ok){hint.textContent='⚠ AR 미지원 기기';hint.style.color='#ff9090';return;}
        btn.disabled=true;btn.textContent='카메라 시작 중...';
        navigator.xr.requestSession('immersive-ar',{requiredFeatures:['local'],optionalFeatures:['hit-test','dom-overlay'],domOverlay:{root:document.getElementById('arOverlay')}}).then(function(session){
            renderer.xr.setSession(session);
            xrController=renderer.xr.getController(0); xrController.addEventListener('select',function(){if(!state.placed)placeBed();}); scene.add(xrController);
            session.requestReferenceSpace('local').then(function(ls){
                localSpace=ls;
                session.requestReferenceSpace('viewer').then(function(vs){return session.requestHitTestSource({space:vs});}).then(function(src){hitTestSource=src;hasHitTest=true;reticle.visible=true;}).catch(function(){hasHitTest=false;document.getElementById('arGuide').textContent='화면을 탭해서 배치하세요';});
            });
            scene.background=null; floorMesh.visible=backWallMesh.visible=sideWallMesh.visible=false;
            state.isAR=true;state.placed=false;if(bedGroup)bedGroup.visible=false;
            document.getElementById('productUI').style.display='none'; document.getElementById('arOverlay').style.display='flex';
            document.getElementById('arPlaceBtn').style.display='none'; document.getElementById('rotateBar').style.display='none'; document.getElementById('arGuide').style.display='block';
            session.addEventListener('end',endAR);
        }).catch(function(e){hint.textContent='⚠ AR 시작 실패: '+(e.message||e);hint.style.color='#ff9090';btn.disabled=false;btn.innerHTML='<span class="ar-btn__icon">◎</span>이 상품을 카메라(AR)로 배치해보기';});
    });
}

function endAR(){
    scene.background=new THREE.Color(0x1E1C1A); floorMesh.visible=backWallMesh.visible=sideWallMesh.visible=true;
    reticle.visible=false; state.isAR=false; state.placed=false; hitTestSource=null; hasHitTest=false;
    if(xrController){scene.remove(xrController);xrController=null;}
    if(bedGroup){bedGroup.visible=true;bedGroup.rotation.y=0;bedGroup.position.set(0,0,0);}
    state.rotDeg=0;
    document.getElementById('arStartBtn').disabled=false;
    document.getElementById('arStartBtn').innerHTML='<span class="ar-btn__icon">◎</span>이 상품을 카메라(AR)로 배치해보기';

function initRotCanvas(){var c=document.getElementById('rotCanvas');c.width=window.innerWidth;c.height=52;drawRuler();}
function drawRuler(){
    var c=document.getElementById('rotCanvas');if(!c||!c.getContext)return;
    var ctx=c.getContext('2d'),W=c.width,H=c.height,PX=3,a=state.rotDeg;ctx.clearRect(0,0,W,H);
    var sd=Math.floor((a-W/PX/2)/5)*5,ed=Math.ceil((a+W/PX/2)/5)*5;
    for(var d=sd;d<=ed;d+=5){var x=W/2+(d-a)*PX,big=(d%90===0),mid=(d%30===0);ctx.strokeStyle='rgba(255,255,255,'+(big?0.9:mid?0.55:0.28)+')';ctx.lineWidth=big?2:1;ctx.beginPath();ctx.moveTo(x,H-(big?22:mid?14:6));ctx.lineTo(x,H-1);ctx.stroke();if(mid){var lbl=((d%360)+360)%360;if(lbl>180)lbl-=360;ctx.fillStyle=big?'rgba(255,255,255,0.85)':'rgba(255,255,255,0.45)';ctx.font=(big?'bold ':'')+' 9px -apple-system,sans-serif';ctx.textAlign='center';ctx.fillText(lbl+'°',x,H-(big?22:14)-3);}}
    ctx.strokeStyle='rgba(255,255,255,0.9)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();
    var gr=ctx.createLinearGradient(0,0,W,0);gr.addColorStop(0,'rgba(0,0,0,0.8)');gr.addColorStop(0.12,'rgba(0,0,0,0)');gr.addColorStop(0.88,'rgba(0,0,0,0)');gr.addColorStop(1,'rgba(0,0,0,0.8)');ctx.fillStyle=gr;ctx.fillRect(0,0,W,H);
}
function updateRotDisplay(){var d=Math.round(state.rotDeg),disp=((d%360)+360)%360;if(disp>180)disp-=360;document.getElementById('rotDegLabel').textContent=disp+'°';drawRuler();}

var ma=document.getElementById('arMoveArea');
ma.addEventListener('touchstart',function(e){if(!state.placed)return;e.preventDefault();isMov=true;},{passive:false});
ma.addEventListener('touchmove',function(e){if(!isMov||!state.placed||!bedGroup||!lastXRCam)return;e.preventDefault();var t=e.touches[0],ndx=(t.clientX/window.innerWidth)*2-1,ndy=-(t.clientY/window.innerHeight)*2+1;raycaster.setFromCamera(new THREE.Vector2(ndx,ndy),lastXRCam);var tgt=new THREE.Vector3();if(raycaster.ray.intersectPlane(floorPlane,tgt)){bedGroup.position.x=tgt.x;bedGroup.position.z=tgt.z;}},{passive:false});
ma.addEventListener('touchend',function(){isMov=false;});
var rc=document.getElementById('rotCanvas');
rc.addEventListener('touchstart',function(e){e.preventDefault();isRot=true;rotX=e.touches[0].clientX;rotD=state.rotDeg;},{passive:false});
rc.addEventListener('touchmove',function(e){if(!isRot)return;e.preventDefault();state.rotDeg=rotD-(e.touches[0].clientX-rotX)*0.5;if(bedGroup)bedGroup.rotation.y=state.rotDeg*Math.PI/180;updateRotDisplay();},{passive:false});
rc.addEventListener('touchend',function(){isRot=false;});
var mRot=false,mX=0,mD=0;
rc.addEventListener('mousedown',function(e){mRot=true;mX=e.clientX;mD=state.rotDeg;});
window.addEventListener('mousemove',function(e){if(!mRot)return;state.rotDeg=mD-(e.clientX-mX)*0.5;if(bedGroup&&state.placed)bedGroup.rotation.y=state.rotDeg*Math.PI/180;updateRotDisplay();});
window.addEventListener('mouseup',function(){mRot=false;});

/* ── UI 이벤트 ── */
document.getElementById('arPlaceBtn').addEventListener('click',placeBed);
document.getElementById('arEndBtn').addEventListener('click',function(){var s=renderer.xr.getSession();if(s)s.end();else endAR();});
document.getElementById('arStartBtn').addEventListener('click',startAR);
document.getElementById('arResetBtn').addEventListener('click',function(){if(bedGroup)bedGroup.visible=false;state.placed=false;state.rotDeg=0;document.getElementById('rotateBar').style.display='none';reticle.visible=hasHitTest;document.getElementById('arGuide').textContent=hasHitTest?'바닥을 향해 카메라를 천천히 움직여주세요':'화면을 탭해서 배치하세요';document.getElementById('arGuide').style.display='block';});
document.getElementById('prodTabs').addEventListener('click',function(e){var t=e.target.closest('.prod-tab');if(!t)return;document.querySelectorAll('.prod-tab').forEach(function(b){b.classList.remove('is-on');});t.classList.add('is-on');state.prod=t.dataset.prod;updateBed();});
document.getElementById('sizeChips').addEventListener('click',function(e){var b=e.target.closest('.chip');if(!b)return;document.querySelectorAll('#sizeChips .chip').forEach(function(x){x.classList.remove('is-on');});b.classList.add('is-on');state.size=b.dataset.size;updateBed();});
document.getElementById('stylingChips').addEventListener('click',function(e){var b=e.target.closest('.chip');if(!b)return;document.querySelectorAll('#stylingChips .chip').forEach(function(x){x.classList.remove('is-on');});b.classList.add('is-on');state.styling=b.dataset.style;document.getElementById('beddingSection').style.display=(state.styling==='full')?'':'none';updateBed();});
document.getElementById('colorChips').addEventListener('click',function(e){var b=e.target.closest('.color-chip');if(!b)return;document.querySelectorAll('.color-chip').forEach(function(x){x.classList.remove('is-on');});b.classList.add('is-on');state.bedding=parseInt(b.dataset.color.replace('#',''),16);document.getElementById('colorName').textContent=b.dataset.name;updateBed();});
document.getElementById('floorChips').addEventListener('click',function(e){var b=e.target.closest('.surface-chip');if(!b)return;document.querySelectorAll('#floorChips .surface-chip').forEach(function(x){x.classList.remove('is-on');});b.classList.add('is-on');state.floor=b.dataset.key;var nt=makeWoodTex(FLOOR_HEX[state.floor]);floorMesh.material.map=nt;floorMesh.material.needsUpdate=true;});
document.getElementById('wallChips').addEventListener('click',function(e){var b=e.target.closest('.surface-chip');if(!b)return;document.querySelectorAll('#wallChips .surface-chip').forEach(function(x){x.classList.remove('is-on');});b.classList.add('is-on');state.wall=b.dataset.key;backWallMesh.material.color.setHex(WALL_HEX[state.wall]);sideWallMesh.material.color.setHex(WALL_HEX[state.wall]);});
if(navigator.xr){navigator.xr.isSessionSupported('immersive-ar').then(function(ok){if(ok){document.getElementById('arStartBtn').classList.add('is-ready');document.getElementById('arHint').textContent='이 기기에서 AR을 사용할 수 있습니다';document.getElementById('arHint').classList.add('is-ok');}});}
if(urlP.get('prod')){document.querySelectorAll('.prod-tab').forEach(function(t){t.classList.toggle('is-on',t.dataset.prod===state.prod);});}

/* ── 렌더 루프 ── */
renderer.setAnimationLoop(function(time,frame){
    if(state.isAR){
        lastXRCam=renderer.xr.getCamera(camera); lastXRCam.getWorldPosition(lastCamPos); lastXRCam.getWorldDirection(lastCamDir);
        if(frame&&hitTestSource){var hits=frame.getHitTestResults(hitTestSource);if(hits.length>0){var pose=hits[0].getPose(localSpace);if(pose){reticle.visible=true;reticle.matrix.fromArray(pose.transform.matrix);reticle.position.setFromMatrixPosition(reticle.matrix);if(!state.placed){document.getElementById('arPlaceBtn').style.display='block';document.getElementById('arGuide').style.display='none';}}}else{reticle.visible=false;if(!state.placed){document.getElementById('arPlaceBtn').style.display='none';document.getElementById('arGuide').style.display='block';}}}
    }
    if(!state.isAR)controls.update();
    renderer.render(scene,camera);
});
window.addEventListener('resize',function(){camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);if(state.placed)initRotCanvas();});

updateBed();
</script>
</body>
</html>
