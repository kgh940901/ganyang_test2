<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소파 바닥매트 — GANYANG</title>
    <link rel="stylesheet" href="css/simulator.css">
</head>
<body>

    <!-- 타이틀 -->
    <section class="pt">
        <div class="pt__inner">
            <p class="pt__cat">SOFA FLOOR MAT</p>
            <h1 class="pt__title">나만의 조합을 찾아보세요</h1>
        </div>
    </section>

    <!-- 시뮬레이터 -->
    <main class="sim">
        <div class="sim__layout">

            <!-- 미리보기 -->
            <div class="sim__preview">
                <div class="sim__scene">
                    <div class="sim__mat-wrap">
                        <img id="matImg" class="sim__mat-img" src="" alt="바닥매트" style="display:none">
                        <div id="matShape" class="sim__mat-shape"></div>
                    </div>
                    <div class="sim__sofa-wrap">
                        <img id="sofaImg" class="sim__sofa-img" src="" alt="소파">
                    </div>
                </div>
                <div class="sim__badge">
                    <span class="sim__badge-dot"></span>
                    <span id="badgeText">아이보리 소파 + 아이보리 매트</span>
                </div>
            </div>

            <!-- 옵션 패널 -->
            <div class="sim__panel">

                <!-- STEP 01 소파 -->
                <div class="sim__step">
                    <div class="sim__step-head">
                        <span class="sim__step-num">01</span>
                        <div>
                            <h2 class="sim__step-title">소파 색상</h2>
                            <p class="sim__step-desc">내 소파와 가장 가까운 색상을 선택하세요</p>
                        </div>
                    </div>
                    <div class="sim__swatches" id="sofaSwatches" role="radiogroup" aria-label="소파 색상"></div>
                </div>

                <div class="sim__rule"></div>

                <!-- STEP 02 매트 -->
                <div class="sim__step">
                    <div class="sim__step-head">
                        <span class="sim__step-num">02</span>
                        <div>
                            <h2 class="sim__step-title">매트 색상</h2>
                            <p class="sim__step-desc">원하는 매트 색상을 선택하세요</p>
                        </div>
                    </div>
                    <div class="sim__swatches" id="matSwatches" role="radiogroup" aria-label="매트 색상"></div>
                </div>

                <!-- 현재 선택 -->
                <div class="sim__sel-card">
                    <span class="sim__sel-label">현재 선택</span>
                    <span id="selText" class="sim__sel-value">아이보리 소파 + 아이보리 매트</span>
                </div>

                <!-- 수량 + 장바구니 -->
                <div class="cart-area">
                    <div class="cart-qty">
                        <button class="cart-qty__btn" id="qtyMinus" aria-label="수량 감소">−</button>
                        <span class="cart-qty__val" id="qtyVal">1</span>
                        <button class="cart-qty__btn" id="qtyPlus" aria-label="수량 증가">+</button>
                    </div>
                    <button class="cart-btn" id="cartBtn" onclick="addToCart()">
                        <span class="cart-btn__text">장바구니 담기</span>
                        <span class="cart-btn__spinner" aria-hidden="true"></span>
                    </button>
                </div>

            </div>
        </div>
    </main>

    <!-- 하단 고정 바 (모바일용) -->
    <footer class="gf">
        <div class="gf__inner">
            <div class="gf__info">
                <span class="gf__label">선택 매트</span>
                <span id="footerText" class="gf__value">아이보리 매트</span>
            </div>
            <button class="gf__cart-btn" onclick="addToCart()">장바구니 담기</button>
        </div>
    </footer>

    <!-- 장바구니 토스트 알림 -->
    <div class="toast" id="toast" role="alert" aria-live="polite">
        <span class="toast__icon">✓</span>
        <span id="toastMsg">장바구니에 담겼습니다.</span>
    </div>

    <script src="js/simulator.js"></script>
</body>
</html>
