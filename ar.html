function clamp(v){ return Math.min(255,Math.max(0,Math.round(v))); }

/* ‚ĒÄ‚ĒÄ Ūą¨žā¨žĚīŽďú žč§ž†ú ž†úŪíą Ž©ĒžČ¨ ŪĆ®ŽłĆŽ¶≠ ŪÖćžä§ž≤ė ‚ĒÄ‚ĒÄ
   žč§ž†ú ž†úŪíą žā¨žßĄ Ž∂ĄžĄĚ:
   - ŽłĒŽ£®-žį®žĹú Í∑łŽ†ąžĚī (#5C6472)
   - žīėžīėŪēú žąėŪŹČ Ž¶¨ŽłĆ(rib) ŪĆ®ŪĄī
   - ÍįÄŽ°ú√óžĄłŽ°ú Í≤©žěź Ž©ĒžČ¨
   - Ž™®žĄúŽ¶¨ žĚĆžėĀ
   - SENSEMOM žöįžł°ŪēėŽč® ŽĆÄÍįĀ ŪÉúÍ∑ł */
function makeMeshFabricTex(hex, opts) {
    opts = opts || {};
    var tagText    = opts.tag || 'SENSE MOM';   /* žĹĒŽĄą ŪÉúÍ∑ł ŪÖćžä§Ūäł */
    var accentLine = opts.accentLine || false;  /* žúóŽ©ī ŪĚįžÉČ ÍįÄŽ°ú ŽĚľžĚł */
    var the9Label  = opts.the9Label || false;   /* ŪĚįžÉČ THE9 ŽĚľŽ≤® (žčúÍ∑łŽčąž≤ė) */
    var cornerTag  = opts.cornerTag || false;   /* žĖīŽĎźžöī ŽĆÄÍįĀ žĹĒŽĄą ŪÉúÍ∑ł (Ūą¨žā¨žĚīŽďú) */
    var senseBand  = opts.senseBand || false;   /* 3žÉČ SENSE MOM ŽĚ† (Ž≤†žĚīžßĀ) */
    var S = 512;
    var cv = document.createElement('canvas');
    cv.width = cv.height = S;
    var ctx = cv.getContext('2d');
    var c = hexRGB(hex);

    /* Ž≤†žĚīžä§ žÉČžÉĀ */
    ctx.fillStyle = 'rgb('+c.r+','+c.g+','+c.b+')';
    ctx.fillRect(0, 0, S, S);

    /* ‚Ď† žąėŪŹČ Ž¶¨ŽłĆ ŽĚľžĚł (ž£ľ žßąÍįź) */
    for (var y = 0; y < S; y += 4) {
        /* žĖīŽĎźžöī žĄ† */
        ctx.fillStyle = 'rgba(0,0,0,0.11)';
        ctx.fillRect(0, y, S, 1);
        /* ŽįĚžĚÄ žĄ† (ŪēėžĚīŽĚľžĚīŪäł) */
        ctx.fillStyle = 'rgba(255,255,255,0.045)';
        ctx.fillRect(0, y+2, S, 1);
    }

    /* ‚Ď° žąėžßĀ ŽĮłžĄł Í≤©žěź (Ž©ĒžČ¨ ŽäźŽāĆ) */
    for (var x = 0; x < S; x += 4) {
        ctx.fillStyle = 'rgba(0,0,0,0.05)';
        ctx.fillRect(x, 0, 1, S);
    }

    /* ‚ĎĘ ž†Ąž≤ī ŽĻõ Žį©ŪĖ• Í∑łŽěėŽĒĒžĖłŪäł (žôľž™Ĺ žÉĀŽč® ‚Üí žė§Ž•łž™Ĺ ŪēėŽč®) */
    var lightGrad = ctx.createLinearGradient(0, 0, S*0.8, S*0.8);
    lightGrad.addColorStop(0,   'rgba(255,255,255,0.07)');
    lightGrad.addColorStop(0.35,'rgba(255,255,255,0.02)');
    lightGrad.addColorStop(0.7, 'rgba(0,0,0,0)');
    lightGrad.addColorStop(1,   'rgba(0,0,0,0.09)');
    ctx.fillStyle = lightGrad;
    ctx.fillRect(0, 0, S, S);

    /* ‚Ď£ 4Ž©ī Ž™®žĄúŽ¶¨ žĚĆžėĀ (žč§ž†ú ž†úŪíą žā¨žßĄžĚė edge shadow) */
    var ew = 40;
    var edges = [
        [0,0,ew,S,  ew,0,0,0],          /* žôľž™Ĺ */
        [S-ew,0,ew,S, S-ew,0,S,0],       /* žė§Ž•łž™Ĺ */
        [0,0,S,ew,  0,0,0,ew],            /* žúĄ */
        [0,S-ew,S,ew, 0,S-ew,0,S]        /* žēĄŽěė */
    ];
    edges.forEach(function(e){
        var g = ctx.createLinearGradient(e[4],e[5],e[6],e[7]);
        g.addColorStop(0,'rgba(0,0,0,0.18)'); g.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=g; ctx.fillRect(e[0],e[1],e[2],e[3]);
    });

    /* ‚ĒÄ‚ĒÄ 3žÉČ SENSE MOM ŽĚ† (Ž≤†žĚīžßĀ) ‚ĒÄ‚ĒÄ */
    if (senseBand) {
        var bTop = S * 0.44;
        var h1 = S*0.035, h2 = S*0.052, h3 = S*0.030;
        /* ŽłĒŽ£®Í∑łŽ†ąžĚī žä§ŪäłŽĚľžĚīŪĒĄ */
        ctx.fillStyle = '#6E7E9E';
        ctx.fillRect(0, bTop, S, h1);
        /* ŪĚįžÉČ žä§ŪäłŽĚľžĚīŪĒĄ + SENSE MOM ŽįėŽ≥Ķ ŪÖćžä§Ūäł */
        var wy = bTop + h1;
        ctx.fillStyle = '#F2F2F0';
        ctx.fillRect(0, wy, S, h2);
        ctx.fillStyle = '#3A3F48';
        ctx.font = 'bold 11px Arial, sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        for (var tx = 6; tx < S; tx += 132) {
            ctx.fillText('SENSE MOM', tx, wy + h2/2 + 1);
        }
        ctx.textBaseline = 'alphabetic';
        /* ž≤≠Ž°Ě(žčúžēą) žä§ŪäłŽĚľžĚīŪĒĄ */
        ctx.fillStyle = '#36C4E6';
        ctx.fillRect(0, wy + h2, S, h3);
    }

    /* ‚ĒÄ‚ĒÄ ŪĚįžÉČ ÍįÄŽ°ú ŽĚľžĚł (žčúÍ∑łŽčąž≤ė / ž†ĎžĚīžčĚ) ‚ĒÄ‚ĒÄ */
    if (accentLine) {
        var ly = S * 0.82;
        ctx.fillStyle = 'rgba(238,239,242,0.95)';
        ctx.fillRect(0, ly, S, 3);
        ctx.fillStyle = 'rgba(0,0,0,0.10)';
        ctx.fillRect(0, ly+3, S, 1);
        ctx.fillRect(0, ly-1, S, 1);
    }

    /* ‚ĒÄ‚ĒÄ ŪĚįžÉČ THE9 ŽĚľŽ≤® (žčúÍ∑łŽčąž≤ė ž†Ąžö©) ‚ĒÄ‚ĒÄ */
    if (the9Label) {
        var lw = 46, lh = 30;
        var lx = S * 0.88, lyy = S * 0.90;
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(lx, lyy, lw, lh);
        ctx.strokeStyle = 'rgba(0,0,0,0.12)';
        ctx.lineWidth = 1;
        ctx.strokeRect(lx + 0.5, lyy + 0.5, lw - 1, lh - 1);
        ctx.fillStyle = '#2B2F38';
        ctx.textAlign = 'center';
        ctx.font = '4px Arial, sans-serif';
        ctx.fillText('SIGNATURE', lx + lw/2, lyy + 10);
        ctx.font = 'bold 14px Arial, sans-serif';
        ctx.fillText('THE 9', lx + lw/2, lyy + 23);
        ctx.font = '4px Arial, sans-serif';
        ctx.fillStyle = 'rgba(43,47,56,0.55)';
        ctx.fillText('žčúÍ∑łŽčąž≤ė ŽćĒŽāėžĚł', lx + lw/2, lyy + 30);
    }

    /* ‚ĒÄ‚ĒÄ žĖīŽĎźžöī ŽĆÄÍįĀ žĹĒŽĄą ŪÉúÍ∑ł (Ūą¨žā¨žĚīŽďú SENSE MOM) ‚ĒÄ‚ĒÄ */
    if (cornerTag) {
        ctx.save();
        ctx.translate(S - 50, S - 20);
        ctx.rotate(-Math.PI / 4);
        ctx.fillStyle = '#111318';
        ctx.beginPath();

function makeQuiltTex(hex) {

            var nx=(lum(x-1,y)-lum(x+1,y))*strength, ny=(lum(x,y-1)-lum(x,y+1))*strength, nz=1;

        var topTex  = makeMeshFabricTex(p.topHex, { tag:p.tag, accentLine:p.accentLine, the9Label:p.the9Label, cornerTag:p.cornerTag, senseBand:p.senseBand });

        loadImageInto(topMat,  p.topImage);

        /* Ž©ĒžĚł Žß§ŪäłŽ¶¨žä§ ŽįĒŽĒĒ */

        if (state.styling === 'full') {

            bddMesh.position.set(0,mattH+bddH/2,sz.l*0.06); bddMesh.castShadow=true; g.add(bddMesh);

            /* žĚīŽ∂ą ž†ĎŪěė */
            var foldBr=Math.min(0xFFFFFF,beddingHex+0x0E0E0E);

            foldMesh.position.set(0,mattH+bddH+0.01,sz.l*0.06-bddLen/2-0.01); g.add(foldMesh);

            /* Ž≤†Íįú */
            var pilY=mattH+0.038, pilZ=-sz.l/2+0.35;

                var pt=makeQuiltTex(i===0?0xF8F5F0:0xF0EDE8);

        var platH=0.08;

        var hbMat=new THREE.MeshStandardMaterial({color:0x5E4430,roughness:0.65,metalness:0.03,envMapIntensity:0.4});

        hb.position.set(0,platH+hbH/2,-sz.l/2-0.05); hb.castShadow=true; g.add(hb);
        var pan=new THREE.Mesh(new THREE.BoxGeometry(sz.w-0.08,hbH-0.14,0.05),panMat);
        pan.position.set(0,platH+hbH/2,-sz.l/2-0.09); g.add(pan);
        var lm=new THREE.MeshStandardMaterial({color:0x8A6E54,roughness:0.5,metalness:0.1});
        [0.16,0.34,0.52].forEach(function(y){

        var topTex=makeQuiltTex(p.topHex); var topNorm=makeNormalFrom(topTex.image,2.5); topNorm.encoding=THREE.LinearEncoding;
        var topMat2=new THREE.MeshStandardMaterial({map:topTex,normalMap:topNorm,normalScale:new THREE.Vector2(0.4,0.4),roughness:0.88,metalness:0,envMapIntensity:0.5});
        var sideTex2=makeDarkSideTex(p.sideHex);
        var sideMat2=new THREE.MeshStandardMaterial({map:sideTex2,roughness:0.9,envMapIntensity:0.35});
        var botMat2=new THREE.MeshStandardMaterial({color:p.sideHex,roughness:0.95});
        var matt=new THREE.Mesh(new THREE.BoxGeometry(sz.w,mattH,sz.l),[sideMat2,sideMat2,topMat2,botMat2,sideMat2,sideMat2]);
        matt.position.y=platH+mattH/2; matt.castShadow=true; g.add(matt);

        var surfY=platH+mattH;
        var topper=new THREE.Mesh(new THREE.BoxGeometry(sz.w-0.02,0.05,sz.l-0.02),new THREE.MeshStandardMaterial({map:makeQuiltTex(0xFAF7F3),roughness:0.92,envMapIntensity:0.4}));
        topper.position.y=surfY+0.025; topper.castShadow=true; g.add(topper); surfY+=0.05;

        if (state.styling === 'full') {

            var bdg=new THREE.Mesh(new THREE.BoxGeometry(sz.w-0.04,bddH,bddLen),bddM); bdg.position.set(0,surfY+bddH/2,sz.l*0.07); bdg.castShadow=true; g.add(bdg);
            var fm=new THREE.Mesh(new THREE.BoxGeometry(sz.w-0.04,0.024,0.26),new THREE.MeshStandardMaterial({map:makeBeddingTex(Math.min(0xFFFFFF,beddingHex+0x101010)),roughness:0.92}));
            fm.position.set(0,surfY+bddH+0.012,sz.l*0.07-bddLen/2-0.01); g.add(fm);
            [-sz.w*0.22,sz.w*0.22].forEach(function(px,i){

                pil.position.set(px,surfY+0.044,-sz.l/2+0.38); pil.castShadow=true; g.add(pil);
            });

    }

    /* ‚ĒÄ‚ĒÄ žĻ®ŽĆÄ žúĄ ŽįįžĻė: Íłįž°ī žĻ®ŽĆÄ Žß§ŪäłŽ¶¨žä§ žúĄžóź ŽįĒŽč• Žß§ŪäłŽ¶¨žä§Ž•ľ ŪÜ†ŪćľŽ°ú ‚ĒÄ‚ĒÄ */
    if (p.type === 'floor' && state.base === 'bed') {
        var frameH    = 0.22;   /* žöįŽďú ŪĒĆŽěęŪŹľ ŽÜížĚī */
        var baseMattH = 0.20;   /* Íłįž°ī žĻ®ŽĆÄ Žß§ŪäłŽ¶¨žä§ ŽĎźÍĽė */
        var lift      = frameH + baseMattH;
        /* ŽįĒŽč• Žß§ŪäłŽ¶¨žä§ + žĻ®ÍĶ¨ ž†Ąž≤īŽ•ľ (ŪĒĆŽěęŪŹľ+Ž≤†žĚīžä§Žß§ŪäłŽ¶¨žä§) žúĄŽ°ú */
        for (var ci = 0; ci < g.children.length; ci++) {
            g.children[ci].position.y += lift;
        }

        var oakLight = new THREE.MeshStandardMaterial({ color:0xC8AC85, roughness:0.5, metalness:0.05, envMapIntensity:0.6 });
        var oakDark  = new THREE.MeshStandardMaterial({ color:0xB0936C, roughness:0.55, envMapIntensity:0.5 });

        /* žöįŽďú ŪĒĆŽěęŪŹľ (Žß§ŪäłŽ¶¨žä§Ž≥īŽč§ ŽĄďÍ≤Ć ‚ÄĒ Ž™®Žćė ŪĒĆŽěęŪŹľ Ž≤†Žďú) */
        var plW = sz.w + 0.34, plL = sz.l + 0.34;
        var topRailH = 0.10;
        var rail = new THREE.Mesh(new THREE.BoxGeometry(plW, topRailH, plL), oakLight);
        rail.position.y = frameH - topRailH/2;
        rail.castShadow = rail.receiveShadow = true;
        g.add(rail);
        var plinth = new THREE.Mesh(new THREE.BoxGeometry(plW-0.18, frameH-topRailH, plL-0.18), oakDark);
        plinth.position.y = (frameH-topRailH)/2;
        plinth.castShadow = true;
        g.add(plinth);

        /* Íłįž°ī žĻ®ŽĆÄ Žß§ŪäłŽ¶¨žä§ (ŪĚįžÉČ ŪÄľŪĆÖ Ž≤†žĚīžä§) */
        var baseQuilt = makeQuiltTex(0xF6F3EE);
        var baseMattMat = new THREE.MeshStandardMaterial({ map:baseQuilt, roughness:0.92, envMapIntensity:0.3 });
        var baseSideMat = new THREE.MeshStandardMaterial({ color:0xEDEAE3, roughness:0.9 });
        var baseMatt = new THREE.Mesh(
            new THREE.BoxGeometry(sz.w + 0.06, baseMattH, sz.l + 0.06),
            [baseSideMat, baseSideMat, baseMattMat, baseSideMat, baseSideMat, baseSideMat]
        );
        baseMatt.position.y = frameH + baseMattH/2;
        baseMatt.castShadow = true;
        g.add(baseMatt);

        /* žóÖŪôÄžä§ŪĄįŽ¶¨ Ūó§ŽďúŽ≥īŽďú (ŽāģžĚÄ ŪĆ®ŽłĆŽ¶≠ ŪĆ®ŽĄź + žöįŽďú žĖĎ ÍłįŽĎ•) */
        var hbH = 0.62, hbY = frameH + hbH/2 + 0.02;
        var fabricMat = new THREE.MeshStandardMaterial({ color:0xC4BEB2, roughness:0.96, envMapIntensity:0.25 });
        var hbPanel = new THREE.Mesh(new THREE.BoxGeometry(sz.w + 0.10, hbH, 0.07), fabricMat);
        hbPanel.position.set(0, hbY, -plL/2 + 0.02);
        hbPanel.castShadow = true;
        g.add(hbPanel);
        /* Ūó§ŽďúŽ≥īŽďú žöįŽďú žôłÍ≥Ĺ (žĘĆžöį ÍłįŽĎ• + žúóŽ≥Ä) */
        [[-(sz.w/2+0.10), hbY], [sz.w/2+0.10, hbY]].forEach(function(px){
            var post = new THREE.Mesh(new THREE.BoxGeometry(0.07, hbH+0.10, 0.10), oakLight);
            post.position.set(px[0], px[1], -plL/2);
            post.castShadow = true; g.add(post);
        });
        var hbTop = new THREE.Mesh(new THREE.BoxGeometry(sz.w + 0.27, 0.07, 0.10), oakLight);
        hbTop.position.set(0, hbY + hbH/2 + 0.05, -plL/2);
        g.add(hbTop);
    }

    return g;
}

/* Í∑łŽ£ĻžĚė Ž™®Žď† geometry/material/texture Ūēīž†ú (Ž©ĒŽ™®Ž¶¨ ŽąĄžąė Žį©žßÄ) */
function disposeGroup(grp){
    grp.traverse(function(o){
        if(o.geometry) o.geometry.dispose();
        if(o.material){
            var mats = Array.isArray(o.material) ? o.material : [o.material];
            mats.forEach(function(m){
                if(m.map)       m.map.dispose();
                if(m.normalMap) m.normalMap.dispose();
                m.dispose();
            });
        }
    });
}

function updateBed(){
    var ry=0, px=0, pz=0;
    /* žĒ¨žóź Žā®žēĄžěąŽäĒ 'Ž™®Žď†' Žß§ŪäłŽ¶¨žä§ Í∑łŽ£ĻžĚĄ Íįēž†úŽ°ú ž†úÍĪį (Í≤ĻžĻ® Žį©žßÄ) */
    for(var i=scene.children.length-1; i>=0; i--){
        var c=scene.children[i];
        if(c.userData && c.userData.isBed){
            ry=c.rotation.y; px=c.position.x; pz=c.position.z;
            scene.remove(c);
            disposeGroup(c);
        }
    }
    bedGroup = createBed(state.prod, state.size, state.bedding);
    bedGroup.userData.isBed = true;
    bedGroup.rotation.y = ry;
    if(state.placed){ bedGroup.position.x=px; bedGroup.position.z=pz; }
    scene.add(bedGroup);
}

var hitTestSource=null,localSpace=null,hasHitTest=false;

function placeBed(){

    if(hasHitTest&&reticle.visible){bedGroup.position.copy(reticle.position);floorPlane.constant=-reticle.position.y;}
    else{var pos=lastCamPos.clone(),dir=lastCamDir.clone();dir.y=0;if(dir.lengthSq()<0.001)dir.set(0,0,-1);dir.normalize();pos.addScaledVector(dir,2.0);pos.y=0;bedGroup.position.copy(pos);}

function startAR(){
    var btn=document.getElementById('arStartBtn'),hint=document.getElementById('arHint');
    if(!navigator.xr){hint.textContent='‚ö† AR ŽĮłžßÄžõź ŽłĆŽĚľžöįž†Ä';hint.style.color='#ff9090';return;}
    navigator.xr.isSessionSupported('immersive-ar').then(function(ok){
        if(!ok){hint.textContent='‚ö† AR ŽĮłžßÄžõź ÍłįÍłį';hint.style.color='#ff9090';return;}
        btn.disabled=true;btn.textContent='žĻīŽ©ĒŽĚľ žčúžěĎ ž§Ď...';
        navigator.xr.requestSession('immersive-ar',{requiredFeatures:['local'],optionalFeatures:['hit-test','dom-overlay'],domOverlay:{root:document.getElementById('arOverlay')}}).then(function(session){
            renderer.xr.setSession(session);
            xrController=renderer.xr.getController(0); xrController.addEventListener('select',function(){if(!state.placed)placeBed();}); scene.add(xrController);
            session.requestReferenceSpace('local').then(function(ls){
                localSpace=ls;
                session.requestReferenceSpace('viewer').then(function(vs){return session.requestHitTestSource({space:vs});}).then(function(src){hitTestSource=src;hasHitTest=true;reticle.visible=true;}).catch(function(){hasHitTest=false;document.getElementById('arGuide').textContent='ŪôĒŽ©īžĚĄ ŪÉ≠ŪēīžĄú ŽįįžĻėŪēėžĄłžöĒ';});
            });
            scene.background=null; floorMesh.visible=backWallMesh.visible=sideWallMesh.visible=false; roomProps.visible=false;
            state.isAR=true;state.placed=false;if(bedGroup)bedGroup.visible=false;
            document.getElementById('productUI').style.display='none'; document.getElementById('arOverlay').style.display='flex';
            document.getElementById('arPlaceBtn').style.display='none'; document.getElementById('rotateBar').style.display='none'; document.getElementById('arGuide').style.display='block';
            session.addEventListener('end',endAR);
        }).catch(function(e){hint.textContent='‚ö† AR žčúžěĎ žč§ŪĆ®: '+(e.message||e);hint.style.color='#ff9090';btn.disabled=false;btn.innerHTML='<span class="ar-btn__icon">‚óé</span>žĚī žÉĀŪíąžĚĄ žĻīŽ©ĒŽĚľ(AR)Ž°ú ŽįįžĻėŪēīŽ≥īÍłį';});
    });
}

function endAR(){
    scene.background=new THREE.Color(0x1E1C1A); floorMesh.visible=backWallMesh.visible=sideWallMesh.visible=true; roomProps.visible=true;

    document.getElementById('productUI').style.display='flex'; document.getElementById('arOverlay').style.display='none'; document.getElementById('rotateBar').style.display='none';
}

function drawRuler(){
    var c=document.getElementById('rotCanvas');if(!c||!c.getContext)return;
    var ctx=c.getContext('2d'),W=c.width,H=c.height,PX=3,a=state.rotDeg;ctx.clearRect(0,0,W,H);
    var sd=Math.floor((a-W/PX/2)/5)*5,ed=Math.ceil((a+W/PX/2)/5)*5;
    for(var d=sd;d<=ed;d+=5){var x=W/2+(d-a)*PX,big=(d%90===0),mid=(d%30===0);ctx.strokeStyle='rgba(255,255,255,'+(big?0.9:mid?0.55:0.28)+')';ctx.lineWidth=big?2:1;ctx.beginPath();ctx.moveTo(x,H-(big?22:mid?14:6));ctx.lineTo(x,H-1);ctx.stroke();if(mid){var lbl=((d%360)+360)%360;if(lbl>180)lbl-=360;ctx.fillStyle=big?'rgba(255,255,255,0.85)':'rgba(255,255,255,0.45)';ctx.font=(big?'bold ':'')+' 9px -apple-system,sans-serif';ctx.textAlign='center';ctx.fillText(lbl+'¬į',x,H-(big?22:14)-3);}}
    ctx.strokeStyle='rgba(255,255,255,0.9)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();
    var gr=ctx.createLinearGradient(0,0,W,0);gr.addColorStop(0,'rgba(0,0,0,0.8)');gr.addColorStop(0.12,'rgba(0,0,0,0)');gr.addColorStop(0.88,'rgba(0,0,0,0)');gr.addColorStop(1,'rgba(0,0,0,0.8)');ctx.fillStyle=gr;ctx.fillRect(0,0,W,H);
}
function updateRotDisplay(){var d=Math.round(state.rotDeg),disp=((d%360)+360)%360;if(disp>180)disp-=360;document.getElementById('rotDegLabel').textContent=disp+'¬į';drawRuler();}

/* ‚ĒÄ‚ĒÄ ŪĄįžĻė / Žßąžöįžä§ ‚ĒÄ‚ĒÄ */
var isMov=false,isRot=false,rotX=0,rotD=0;
var ma=document.getElementById('arMoveArea');
ma.addEventListener('touchstart',function(e){if(!state.placed)return;e.preventDefault();isMov=true;},{passive:false});
ma.addEventListener('touchmove',function(e){if(!isMov||!state.placed||!bedGroup||!lastXRCam)return;e.preventDefault();var t=e.touches[0],ndx=(t.clientX/window.innerWidth)*2-1,ndy=-(t.clientY/window.innerHeight)*2+1;raycaster.setFromCamera(new THREE.Vector2(ndx,ndy),lastXRCam);var tgt=new THREE.Vector3();if(raycaster.ray.intersectPlane(floorPlane,tgt)){bedGroup.position.x=tgt.x;bedGroup.position.z=tgt.z;}},{passive:false});
ma.addEventListener('touchend',function(){isMov=false;});
var rc=document.getElementById('rotCanvas');
rc.addEventListener('touchstart',function(e){e.preventDefault();isRot=true;rotX=e.touches[0].clientX;rotD=state.rotDeg;},{passive:false});
rc.addEventListener('touchmove',function(e){if(!isRot)return;e.preventDefault();state.rotDeg=rotD-(e.touches[0].clientX-rotX)*0.5;if(bedGroup)bedGroup.rotation.y=state.rotDeg*Math.PI/180;updateRotDisplay();},{passive:false});
rc.addEventListener('touchend',function(){isRot=false;});
var mRot=false,mX=0,mD=0;
rc.addEventListener('mousedown',function(e){mRot=true;mX=e.clientX;mD=state.rotDeg;});
window.addEventListener('mousemove',function(e){if(!mRot)return;state.rotDeg=mD-(e.clientX-mX)*0.5;if(bedGroup&&state.placed)bedGroup.rotation.y=state.rotDeg*Math.PI/180;updateRotDisplay();});
window.addEventListener('mouseup',function(){mRot=false;});

document.getElementById('sizeChips').addEventListener('click',function(e){var b=e.target.closest('.chip');if(!b)return;document.querySelectorAll('#sizeChips .chip').forEach(function(x){x.classList.remove('is-on');});b.classList.add('is-on');state.size=b.dataset.size;updateBed();});
document.getElementById('stylingChips').addEventListener('click',function(e){var b=e.target.closest('.chip');if(!b)return;document.querySelectorAll('#stylingChips .chip').forEach(function(x){x.classList.remove('is-on');});b.classList.add('is-on');state.styling=b.dataset.style;document.getElementById('beddingSection').style.display=(state.styling==='full')?'':'none';updateBed();});
document.getElementById('baseChips').addEventListener('click',function(e){var b=e.target.closest('.chip');if(!b)return;document.querySelectorAll('#baseChips .chip').forEach(function(x){x.classList.remove('is-on');});b.classList.add('is-on');state.base=b.dataset.base;updateBed();});

renderer.setAnimationLoop(function(time,frame){
    if(state.isAR){
        lastXRCam=renderer.xr.getCamera(camera); lastXRCam.getWorldPosition(lastCamPos); lastXRCam.getWorldDirection(lastCamDir);
        if(frame&&hitTestSource){var hits=frame.getHitTestResults(hitTestSource);if(hits.length>0){var pose=hits[0].getPose(localSpace);if(pose){reticle.visible=true;reticle.matrix.fromArray(pose.transform.matrix);reticle.position.setFromMatrixPosition(reticle.matrix);if(!state.placed){document.getElementById('arPlaceBtn').style.display='block';document.getElementById('arGuide').style.display='none';}}}else{reticle.visible=false;if(!state.placed){document.getElementById('arPlaceBtn').style.display='none';document.getElementById('arGuide').style.display='block';}}}
    }

});
